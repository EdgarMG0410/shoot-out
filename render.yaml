# Render Blueprint — deploys the AdonisJS app + a managed PostgreSQL database.
# In Render: New ▸ Blueprint ▸ pick this repo. Everything below is provisioned.
services:
  - type: web
    name: shootout
    runtime: node
    plan: free
    # Build the app + frontend, then install prod deps inside the compiled output.
    buildCommand: npm ci && node ace build && cd build && npm ci --omit=dev
    # Run pending migrations on each deploy (idempotent), then boot.
    startCommand: cd build && node ace migration:run --force && node bin/server.js
    healthCheckPath: /auth/login
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: SESSION_DRIVER
        value: cookie
      - key: TZ
        value: UTC
      - key: DB_CONNECTION
        value: postgres
      - key: APP_KEY
        generateValue: true
      # Supabase: paste the Session-pooler connection string in the Render
      # dashboard (Settings ▸ Database ▸ Connection string ▸ Session pooler).
      - key: DATABASE_URL
        sync: false
